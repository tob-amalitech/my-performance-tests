name: Performance Tests - Swag Labs 

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  schedule:
    # Run nightly at 2:00 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Select test type to run'
        required: true
        default: 'baseline'
        type: choice
        options:
          - baseline
          - load
          - stress
          - endurance
          - all
      thread_count:
        description: 'Override thread count (optional)'
        required: false
        default: ''

env:
  JMETER_VERSION: '5.6.3'
  JMETER_HOME: /opt/apache-jmeter
  RESULTS_DIR: results
  REPORTS_DIR: reports

jobs:
  # =====================================================================
  # JOB 1: BASELINE TEST (50 Users)
  # =====================================================================
  baseline-test:
    name: Baseline Test (50 Users)
    runs-on: ubuntu-latest
    if: |
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.test_type == 'baseline' ||
      github.event.inputs.test_type == 'all'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache JMeter Installation
        id: cache-jmeter
        uses: actions/cache@v4
        with:
          path: ${{ env.JMETER_HOME }}
          key: jmeter-${{ env.JMETER_VERSION }}

      - name: Install Apache JMeter
        if: steps.cache-jmeter.outputs.cache-hit != 'true'
        run: |
          wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-${{ env.JMETER_VERSION }}.tgz
          tar -xzf apache-jmeter-${{ env.JMETER_VERSION }}.tgz
          sudo mv apache-jmeter-${{ env.JMETER_VERSION }} ${{ env.JMETER_HOME }}
          echo "${{ env.JMETER_HOME }}/bin" >> $GITHUB_PATH

      - name: Create Results Directories
        run: |
          mkdir -p ${{ env.RESULTS_DIR }}/baseline
          mkdir -p ${{ env.REPORTS_DIR }}/baseline

      - name: Run Baseline Performance Test (50 Users)
        run: |
          ${{ env.JMETER_HOME }}/bin/jmeter \
            -n \
            -t SwagLabs_PerformanceTest.jmx \
            -l ${{ env.RESULTS_DIR }}/baseline/results.jtl \
            -e \
            -o ${{ env.REPORTS_DIR }}/baseline \
            -Jthreads=50 \
            -Jrampup=60 \
            -Jduration=300 \
            -Jloops=3 \
            -JBASE_URL=www.saucedemo.com \
            -JPROTOCOL=https \
            -JUSERNAME=standard_user \
            -JPASSWORD=secret_sauce \
            -j ${{ env.RESULTS_DIR }}/baseline/jmeter.log
        continue-on-error: true

      - name: Validate Error Rate (Max 1%)
        run: |
          python3 << 'EOF'
          import csv, sys

          results_file = "${{ env.RESULTS_DIR }}/baseline/results.jtl"
          total = 0
          errors = 0

          with open(results_file, 'r') as f:
              reader = csv.DictReader(f)
              for row in reader:
                  total += 1
                  if row.get('success', '').lower() == 'false':
                      errors += 1

          if total == 0:
              print("WARNING: No results found in JTL file")
              sys.exit(0)

          error_rate = (errors / total) * 100
          print(f"Total Requests: {total}")
          print(f"Errors: {errors}")
          print(f"Error Rate: {error_rate:.2f}%")

          if error_rate > 1.0:
              print(f"FAIL: Error rate {error_rate:.2f}% exceeds threshold of 1%")
              sys.exit(1)
          else:
              print(f"PASS: Error rate {error_rate:.2f}% is within acceptable limit")
          EOF

      - name: Upload Baseline Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: baseline-results
          path: |
            ${{ env.RESULTS_DIR }}/baseline/
            ${{ env.REPORTS_DIR }}/baseline/
          retention-days: 30

      - name: Upload Baseline HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: baseline-html-report
          path: ${{ env.REPORTS_DIR }}/baseline/
          retention-days: 30

  # =====================================================================
  # JOB 2: LOAD TEST (150 Users)
  # =====================================================================
  load-test:
    name: Load Test (150 Users)
    runs-on: ubuntu-latest
    needs: baseline-test
    if: |
      (github.event_name != 'workflow_dispatch' ||
      github.event.inputs.test_type == 'load' ||
      github.event.inputs.test_type == 'all') &&
      (needs.baseline-test.result == 'success' || needs.baseline-test.result == 'skipped')

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache JMeter Installation
        id: cache-jmeter
        uses: actions/cache@v4
        with:
          path: ${{ env.JMETER_HOME }}
          key: jmeter-${{ env.JMETER_VERSION }}

      - name: Install Apache JMeter
        if: steps.cache-jmeter.outputs.cache-hit != 'true'
        run: |
          wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-${{ env.JMETER_VERSION }}.tgz
          tar -xzf apache-jmeter-${{ env.JMETER_VERSION }}.tgz
          sudo mv apache-jmeter-${{ env.JMETER_VERSION }} ${{ env.JMETER_HOME }}
          echo "${{ env.JMETER_HOME }}/bin" >> $GITHUB_PATH

      - name: Create Results Directories
        run: |
          mkdir -p ${{ env.RESULTS_DIR }}/load
          mkdir -p ${{ env.REPORTS_DIR }}/load

      - name: Run Load Test (150 Users)
        run: |
          ${{ env.JMETER_HOME }}/bin/jmeter \
            -n \
            -t SwagLabs_PerformanceTest.jmx \
            -l ${{ env.RESULTS_DIR }}/load/results.jtl \
            -e \
            -o ${{ env.REPORTS_DIR }}/load \
            -Jthreads=150 \
            -Jrampup=120 \
            -Jduration=300 \
            -Jloops=3 \
            -JBASE_URL=www.saucedemo.com \
            -JPROTOCOL=https \
            -JUSERNAME=standard_user \
            -JPASSWORD=secret_sauce \
            -j ${{ env.RESULTS_DIR }}/load/jmeter.log
        continue-on-error: true

      - name: Validate Error Rate (Max 1%)
        run: |
          python3 << 'EOF'
          import csv, sys

          results_file = "${{ env.RESULTS_DIR }}/load/results.jtl"
          total = 0
          errors = 0

          with open(results_file, 'r') as f:
              reader = csv.DictReader(f)
              for row in reader:
                  total += 1
                  if row.get('success', '').lower() == 'false':
                      errors += 1

          if total == 0:
              print("WARNING: No results found")
              sys.exit(0)

          error_rate = (errors / total) * 100
          print(f"Total: {total} | Errors: {errors} | Error Rate: {error_rate:.2f}%")

          if error_rate > 1.0:
              print(f"FAIL: Error rate {error_rate:.2f}% exceeds 1% threshold")
              sys.exit(1)
          else:
              print(f"PASS: Error rate within limits")
          EOF

      - name: Upload Load Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: load-test-results
          path: |
            ${{ env.RESULTS_DIR }}/load/
            ${{ env.REPORTS_DIR }}/load/
          retention-days: 30

  # =====================================================================
  # JOB 3: STRESS TEST (500 Users)
  # =====================================================================
  stress-test:
    name: Stress Test (500 Users)
    runs-on: ubuntu-latest
    needs: load-test
    if: |
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' && (
        github.event.inputs.test_type == 'stress' ||
        github.event.inputs.test_type == 'all'
      )

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache JMeter Installation
        id: cache-jmeter
        uses: actions/cache@v4
        with:
          path: ${{ env.JMETER_HOME }}
          key: jmeter-${{ env.JMETER_VERSION }}

      - name: Install Apache JMeter
        if: steps.cache-jmeter.outputs.cache-hit != 'true'
        run: |
          wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-${{ env.JMETER_VERSION }}.tgz
          tar -xzf apache-jmeter-${{ env.JMETER_VERSION }}.tgz
          sudo mv apache-jmeter-${{ env.JMETER_VERSION }} ${{ env.JMETER_HOME }}
          echo "${{ env.JMETER_HOME }}/bin" >> $GITHUB_PATH

      - name: Create Results Directories
        run: |
          mkdir -p ${{ env.RESULTS_DIR }}/stress
          mkdir -p ${{ env.REPORTS_DIR }}/stress

      - name: Run Stress Test (500 Users)
        run: |
          ${{ env.JMETER_HOME }}/bin/jmeter \
            -n \
            -t SwagLabs_PerformanceTest.jmx \
            -l ${{ env.RESULTS_DIR }}/stress/results.jtl \
            -e \
            -o ${{ env.REPORTS_DIR }}/stress \
            -Jthreads=500 \
            -Jrampup=120 \
            -Jduration=180 \
            -Jloops=1 \
            -JBASE_URL=www.saucedemo.com \
            -JPROTOCOL=https \
            -JUSERNAME=standard_user \
            -JPASSWORD=secret_sauce \
            -j ${{ env.RESULTS_DIR }}/stress/jmeter.log
        continue-on-error: true

      - name: Upload Stress Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stress-test-results
          path: |
            ${{ env.RESULTS_DIR }}/stress/
            ${{ env.REPORTS_DIR }}/stress/
          retention-days: 30

  # =====================================================================
  # JOB 4: ENDURANCE TEST (100 Users / 30 min) - Scheduled/Manual only
  # =====================================================================
  endurance-test:
    name: Endurance Test (100 Users / 30 min)
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' &&
       github.event.inputs.test_type == 'endurance')

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache JMeter Installation
        id: cache-jmeter
        uses: actions/cache@v4
        with:
          path: ${{ env.JMETER_HOME }}
          key: jmeter-${{ env.JMETER_VERSION }}

      - name: Install Apache JMeter
        if: steps.cache-jmeter.outputs.cache-hit != 'true'
        run: |
          wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-${{ env.JMETER_VERSION }}.tgz
          tar -xzf apache-jmeter-${{ env.JMETER_VERSION }}.tgz
          sudo mv apache-jmeter-${{ env.JMETER_VERSION }} ${{ env.JMETER_HOME }}
          echo "${{ env.JMETER_HOME }}/bin" >> $GITHUB_PATH

      - name: Create Results Directories
        run: |
          mkdir -p ${{ env.RESULTS_DIR }}/endurance
          mkdir -p ${{ env.REPORTS_DIR }}/endurance

      - name: Run Endurance Test (100 Users / 30 minutes)
        run: |
          ${{ env.JMETER_HOME }}/bin/jmeter \
            -n \
            -t SwagLabs_PerformanceTest.jmx \
            -l ${{ env.RESULTS_DIR }}/endurance/results.jtl \
            -e \
            -o ${{ env.REPORTS_DIR }}/endurance \
            -Jthreads=100 \
            -Jrampup=120 \
            -Jduration=1800 \
            -Jloops=-1 \
            -JBASE_URL=www.saucedemo.com \
            -JPROTOCOL=https \
            -JUSERNAME=standard_user \
            -JPASSWORD=secret_sauce \
            -j ${{ env.RESULTS_DIR }}/endurance/jmeter.log
        continue-on-error: true

      - name: Upload Endurance Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: endurance-test-results
          path: |
            ${{ env.RESULTS_DIR }}/endurance/
            ${{ env.REPORTS_DIR }}/endurance/
          retention-days: 30

  # =====================================================================
  # JOB 5: GENERATE SUMMARY REPORT
  # =====================================================================
  generate-report:
    name: Generate Performance Summary Report
    runs-on: ubuntu-latest
    needs: [baseline-test, load-test]
    if: always()

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-results/
        continue-on-error: true

      - name: Generate Summary Report
        run: |
          python3 << 'EOF'
          import os, csv, json

          summary = {
              "tests": {}
          }

          test_dirs = {
              "baseline": "all-results/baseline-results/baseline/results.jtl",
              "load": "all-results/load-test-results/load/results.jtl",
          }

          for test_name, jtl_path in test_dirs.items():
              if not os.path.exists(jtl_path):
                  print(f"Skipping {test_name}: file not found at {jtl_path}")
                  continue

              total = errors = 0
              response_times = []

              with open(jtl_path, 'r') as f:
                  reader = csv.DictReader(f)
                  for row in reader:
                      total += 1
                      elapsed = int(row.get('elapsed', 0))
                      response_times.append(elapsed)
                      if row.get('success', '').lower() == 'false':
                          errors += 1

              if total == 0:
                  continue

              response_times.sort()
              p90 = response_times[int(len(response_times) * 0.90)]
              p95 = response_times[int(len(response_times) * 0.95)]
              avg = sum(response_times) / len(response_times)
              error_rate = (errors / total) * 100

              summary["tests"][test_name] = {
                  "total_requests": total,
                  "error_count": errors,
                  "error_rate_pct": round(error_rate, 2),
                  "avg_response_ms": round(avg, 2),
                  "p90_response_ms": p90,
                  "p95_response_ms": p95,
                  "max_response_ms": max(response_times),
                  "pass": error_rate <= 1.0
              }

          print(json.dumps(summary, indent=2))

          with open("performance_summary.json", "w") as f:
              json.dump(summary, f, indent=2)

          # Print markdown summary for GitHub
          print("\n## Performance Test Summary\n")
          print("| Test | Users | Avg (ms) | P90 (ms) | P95 (ms) | Error Rate | Status |")
          print("|------|-------|----------|----------|----------|------------|--------|")

          user_counts = {"baseline": 50, "load": 150, "stress": 500, "endurance": 100}
          for test_name, data in summary["tests"].items():
              status = "✅ PASS" if data["pass"] else "❌ FAIL"
              users = user_counts.get(test_name, "N/A")
              print(f"| {test_name.title()} | {users} | {data['avg_response_ms']} | {data['p90_response_ms']} | {data['p95_response_ms']} | {data['error_rate_pct']}% | {status} |")
          EOF

      - name: Write Summary to GitHub Step Summary
        run: |
          echo "# 🚀 Swag Labs Performance Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Run Date:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Performance Goals" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Target |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Response Time | < 2000ms |" >> $GITHUB_STEP_SUMMARY
          echo "| Error Rate | < 1% |" >> $GITHUB_STEP_SUMMARY
          echo "| Throughput | 500 req/sec |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Upload Summary Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-summary
          path: performance_summary.json
          retention-days: 90